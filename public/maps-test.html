<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Des Moines Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@700&family=Source+Serif+4:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: Arial, sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #map { flex: 1; height: 100vh; min-width: 0; }

        /* ── Sidebar ──────────────────────────────────────────────────── */
        #sidebar {
            width: 340px;
            flex-shrink: 0;
            height: 100vh;
            background: #f7f6f3;
            border-left: 1px solid #e0ddd8;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #sidebar-header {
            padding: 16px 20px 12px;
            border-bottom: 1px solid #e0ddd8;
            background: #f7f6f3;
            flex-shrink: 0;
        }

        #sidebar-header h2 {
            margin: 0 0 2px 0;
            font-family: 'Lora', Georgia, serif;
            font-size: 17px;
            font-weight: 700;
            color: #1a1a1a;
        }

        #sidebar-count {
            font-family: 'Source Serif 4', Georgia, serif;
            font-size: 12.5px;
            color: #888;
        }

        #sidebar-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Each card in the sidebar */
        .sidebar-card {
            background: #ffffff;
            border: 1px solid #e2e0db;
            border-radius: 14px;
            padding: 16px 18px 14px;
            font-family: 'Source Serif 4', Georgia, serif;
            color: #2b2b2b;
            cursor: pointer;
            transition: box-shadow 0.15s, border-color 0.15s;
        }

        .sidebar-card:hover {
            box-shadow: 0 3px 12px rgba(0,0,0,0.10);
            border-color: #c8c4be;
        }

        .sidebar-card.active {
            border-color: #2c5f9e;
            box-shadow: 0 0 0 2px rgba(44,95,158,0.18);
        }

        .sidebar-card h3 {
            margin: 0 0 10px 0;
            font-family: 'Lora', Georgia, serif;
            font-size: 15px;
            font-weight: 700;
            line-height: 1.3;
            color: #1a1a1a;
        }

        .sidebar-card .badges {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 10px;
        }

        .sidebar-card .badge {
            display: inline-flex;
            align-items: flex-start;
            gap: 5px;
            background: #f7f6f3;
            border: 1px solid #e0ddd8;
            border-radius: 10px;
            padding: 3px 10px;
            font-size: 11.5px;
            color: #555;
            white-space: normal;
            word-break: break-word;
            overflow-wrap: anywhere;
            min-width: 0;
        }

        .sidebar-card .badge svg {
            flex-shrink: 0;
            opacity: 0.55;
            margin-top: 2px;
        }

        .sidebar-card .rent-block {
            font-size: 12px;
            color: #555;
            margin-bottom: 10px;
        }

        .sidebar-card .rent-block strong { color: #333; }

        .sidebar-card .rent-block ul {
            margin: 3px 0 0 14px;
            padding: 0;
        }

        .sidebar-card .rent-block li { margin-bottom: 1px; }

        .sidebar-card .evt-desc {
            font-size: 12.5px;
            line-height: 1.5;
            color: #666;
            margin: 0 0 10px 0;
        }

        .sidebar-card .cta {
            display: inline-block;
            background: #d6e4f7;
            color: #2c5f9e;
            font-family: 'Source Serif 4', Georgia, serif;
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 8px;
            transition: background 0.15s;
        }

        .sidebar-card .cta:hover { background: #bdd4ef; }
        .sidebar-card .cta::after { content: " →"; }

        .sidebar-empty {
            font-family: 'Source Serif 4', Georgia, serif;
            font-size: 13.5px;
            color: #aaa;
            text-align: center;
            padding: 40px 20px;
        }

        .controls {
            position: absolute;
            top: 10px;
            left: 10px;
            background: white;
            padding: 12px 16px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            font-size: 14px;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .controls strong {
            margin-bottom: 2px;
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }

        .radio-group input[type="radio"] {
            cursor: pointer;
            accent-color: #3B82F6;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-top: 8px;
            border-top: 1px solid #e5e7eb;
        }

        .filter-group label {
            font-size: 13px;
            color: #374151;
        }

        .price-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .price-row input[type="range"] {
            width: 170px;
        }

        .price-row input[type="number"] {
            width: 80px;
            padding: 4px 6px;
            font-size: 13px;
        }

        .filter-group input[type="date"] {
            padding: 4px 6px;
            font-size: 13px;
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 160px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            cursor: pointer;
        }

        /* ── Carousel controls ────────────────────────────────────────── */
        .popup-carousel {
            min-width: 260px;
        }
        .mapboxgl-popup-content {
            padding: 0;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.10);
            border: 1px solid #e8e8e8;
            background: #f7f6f3;
            max-width: 360px;
            overflow: hidden;
        }

        .mapboxgl-popup-close-button {
            font-size: 18px;
            color: #888;
            padding: 8px 12px;
            line-height: 1;
            z-index: 1;
        }

        .mapboxgl-popup-close-button:hover {
            background: transparent;
            color: #333;
        }

        .apt-popup {
            padding: 20px 22px 18px;
            font-family: 'Source Serif 4', Georgia, serif;
            color: #2b2b2b;
        }

        .apt-popup h3 {
            margin: 0 0 12px 0;
            font-family: 'Lora', Georgia, serif;
            font-size: 18px;
            font-weight: 700;
            line-height: 1.25;
            color: #1a1a1a;
        }

        .apt-popup .badges {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 12px;
        }

        .apt-popup .badge {
            display: inline-flex;
            align-items: flex-start;
            gap: 5px;
            background: #ffffff;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 4px 12px;
            font-size: 12.5px;
            color: #444;
            white-space: normal;
            word-break: break-word;
            overflow-wrap: anywhere;
            min-width: 0;
        }

        .apt-popup .badge svg {
            flex-shrink: 0;
            opacity: 0.6;
            margin-top: 2px;
        }

        .apt-popup .evt-desc {
            font-size: 13.5px;
            line-height: 1.55;
            color: #555;
            margin: 0 0 14px 0;
        }

        .apt-popup .rent-block {
            font-size: 13px;
            color: #555;
            margin-bottom: 14px;
        }

        .apt-popup .rent-block strong {
            color: #333;
        }

        .apt-popup .rent-block ul {
            margin: 4px 0 0 16px;
            padding: 0;
        }

        .apt-popup .rent-block li {
            margin-bottom: 2px;
        }

        .apt-popup .cta {
            display: inline-block;
            background: #d6e4f7;
            color: #2c5f9e;
            font-family: 'Source Serif 4', Georgia, serif;
            font-size: 13.5px;
            font-weight: 600;
            text-decoration: none;
            padding: 9px 18px;
            border-radius: 10px;
            transition: background 0.15s;
        }

        .apt-popup .cta:hover {
            background: #bdd4ef;
        }

        .apt-popup .cta::after {
            content: " →";
        }

        /* ── Carousel controls ────────────────────────────────────────── */
        .popup-carousel {
            min-width: 240px;
            max-width: 300px;
        }

        .carousel-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px solid #e5e7eb;
        }

        .carousel-nav button {
            background: none;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            padding: 3px 10px;
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
            color: #374151;
            transition: background 0.15s;
        }

        .carousel-nav button:hover:not(:disabled) {
            background: #f3f4f6;
        }

        .carousel-nav button:disabled {
            opacity: 0.3;
            cursor: default;
        }

        .carousel-counter {
            font-size: 12px;
            color: #6b7280;
        }

        .filter-group input[type="range"] {
            width: 220px;
        }
    </style>
</head>
<body>

<div class="controls">
    <strong>Show</strong>
    <div class="radio-group">
        <label>
            <input type="radio" name="layer" value="apartments" checked>
            🔵 Apartments
        </label>
        <label>
            <input type="radio" name="layer" value="events">
            🔴 Events
        </label>
    </div>
    <div id="apartment-filters" class="filter-group">
        <strong>Apartment Filters</strong>

        <label for="priceRange">Max Rent</label>
        <div class="price-row">
            <input type="range" id="priceRange" min="500" max="4000" step="50" value="4000">
            <input type="number" id="priceValue" min="500" max="4000" step="50" value="4000">
        </div>
    </div>

    <div id="event-filters" class="filter-group" style="display: none;">
        <strong>Event Filters</strong>

        <label for="eventStartDate">Start Date</label>
        <input type="date" id="eventStartDate">

        <label for="eventEndDate">End Date</label>
        <input type="date" id="eventEndDate">

        <strong>Categories</strong>
        <div id="eventCategoryFilters" class="checkbox-group"></div>
    </div>
</div>

<div id="map"></div>

<div id="sidebar">
    <div id="sidebar-header">
        <h2 id="sidebar-title">Apartments</h2>
        <div id="sidebar-count"></div>
    </div>
    <div id="sidebar-list"></div>
</div>

<script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
<script>
mapboxgl.accessToken = "{{ mapbox_token }}";

const map = new mapboxgl.Map({
    container: "map",
    style: "mapbox://styles/mapbox/streets-v12",
    center: [-93.6250, 41.5868],
    zoom: 11
});

// ── Icons ─────────────────────────────────────────────────────────────────────

const pinIcon = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>`;
const calIcon  = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`;
const phoneIcon = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.93 5.18 2 2 0 012.92 3h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L7.09 10.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>`;

// ── Helpers ───────────────────────────────────────────────────────────────────

function escapeHtml(text) {
    if (!text) return "";
    return String(text)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function extractPriceNumber(priceText) {
    if (!priceText) return null;
    const matches = String(priceText).match(/\d[\d,]*/g);
    if (!matches || matches.length === 0) return null;
    const values = matches.map(v => Number(v.replace(/,/g, ""))).filter(v => !Number.isNaN(v));
    if (values.length === 0) return null;
    return Math.min(...values);
}

function getApartmentMinPrice(apt) {
    if (!apt.rent_by_bed) return null;
    const prices = Object.values(apt.rent_by_bed).map(extractPriceNumber).filter(v => v !== null);
    if (prices.length === 0) return null;
    return Math.min(...prices);
}

function normalizeDateString(value) {
    if (!value) return null;
    const parsed = new Date(value);
    if (Number.isNaN(parsed.getTime())) return null;
    return parsed.toISOString().split("T")[0];
}

function eventMatchesDateRange(event, startDate, endDate) {
    const eventDate = normalizeDateString(event.event_date);
    if (!eventDate) return true;
    if (startDate && eventDate < startDate) return false;
    if (endDate && eventDate > endDate) return false;
    return true;
}

function eventMatchesCategories(event, selectedCategories) {
    if (selectedCategories.length === 0) return true;
    const eventCategories = Array.isArray(event.categories) ? event.categories : [];
    return selectedCategories.some(cat => eventCategories.includes(cat));
}

function collectEventCategories(events) {
    const categorySet = new Set();
    events.forEach(ev => {
        if (Array.isArray(ev.categories)) ev.categories.forEach(c => { if (c) categorySet.add(c); });
    });
    return Array.from(categorySet).sort((a, b) => a.localeCompare(b));
}

function getSelectedEventCategories() {
    return Array.from(document.querySelectorAll("#eventCategoryFilters input:checked")).map(i => i.value);
}

function buildEventCategoryFilters(categories) {
    const container = document.getElementById("eventCategoryFilters");
    container.innerHTML = "";
    categories.forEach(cat => {
        const label = document.createElement("label");
        const input = document.createElement("input");
        input.type = "checkbox";
        input.value = cat;
        label.appendChild(input);
        label.appendChild(document.createTextNode(cat));
        container.appendChild(label);
    });
}

function groupByCoord(events) {
    const groups = {};
    events.forEach(ev => {
        const key = `${ev.longitude},${ev.latitude}`;
        if (!groups[key]) groups[key] = [];
        groups[key].push(ev);
    });
    return groups;
}

// ── Sidebar ───────────────────────────────────────────────────────────────────

const sidebarList  = document.getElementById("sidebar-list");
const sidebarTitle = document.getElementById("sidebar-title");
const sidebarCount = document.getElementById("sidebar-count");

function buildAptSidebarCard(apt) {
    const title   = apt.title || apt.address || "Apartment";
    const address = apt.address || "Unknown address";
    const phone   = apt.phone_number || null;
    const link    = apt.link || null;
    const rent    = apt.rent_by_bed;

    let badges = `<div class="badges">`;
    badges += `<span class="badge">${pinIcon} ${escapeHtml(address)}</span>`;
    if (phone) badges += `<span class="badge">${phoneIcon} ${escapeHtml(phone)}</span>`;
    badges += `</div>`;

    let rentBlock = "";
    if (rent && Object.keys(rent).length > 0) {
        rentBlock = `<div class="rent-block"><strong>Rent</strong><ul>`;
        for (const [bed, price] of Object.entries(rent))
            rentBlock += `<li>${escapeHtml(bed)} — ${escapeHtml(price)}</li>`;
        rentBlock += `</ul></div>`;
    } else {
        rentBlock = `<div class="rent-block"><strong>Rent:</strong> N/A</div>`;
    }

    const cta = link
        ? `<a class="cta" href="${escapeHtml(link)}" target="_blank">View on Apartments.com</a>`
        : "";

    const card = document.createElement("div");
    card.className = "sidebar-card";
    card.dataset.lat = apt.lat;
    card.dataset.lon = apt.lon;
    card.innerHTML = `<h3>${escapeHtml(title)}</h3>${badges}${rentBlock}${cta}`;
    return card;
}

function buildEventSidebarCard(ev) {
    const title   = ev.event_title || "Event";
    const address = ev.address     || "";
    const date    = ev.event_date  || "";
    const desc    = ev.description || "";
    const link    = ev.event_detail_url || null;

    let badges = `<div class="badges">`;
    if (date)    badges += `<span class="badge">${calIcon} ${escapeHtml(date)}</span>`;
    if (address) badges += `<span class="badge">${pinIcon} ${escapeHtml(address)}</span>`;
    badges += `</div>`;

    const descBlock = desc
        ? `<p class="evt-desc">${escapeHtml(desc.length > 100 ? desc.slice(0, 100) + "…" : desc)}</p>`
        : "";

    const cta = link
        ? `<a class="cta" href="${escapeHtml(link)}" target="_blank">View on Catch Des Moines</a>`
        : "";

    const card = document.createElement("div");
    card.className = "sidebar-card";
    card.dataset.lat = ev.latitude;
    card.dataset.lon = ev.longitude;
    card.innerHTML = `<h3>${escapeHtml(title)}</h3>${badges}${descBlock}${cta}`;
    return card;
}

function populateSidebarApartments(apartments, maxPrice) {
    sidebarTitle.textContent = "Apartments";
    sidebarList.innerHTML = "";

    const filtered = apartments
        .filter(apt => apt.lat && apt.lon)
        .filter(apt => {
            const minPrice = getApartmentMinPrice(apt);
            return minPrice === null || minPrice <= maxPrice;
        });

    sidebarCount.textContent = `${filtered.length} listing${filtered.length !== 1 ? "s" : ""}`;

    if (filtered.length === 0) {
        sidebarList.innerHTML = `<div class="sidebar-empty">No apartments match the current filters.</div>`;
        return;
    }

    filtered.forEach(apt => {
        const card = buildAptSidebarCard(apt);
        card.addEventListener("click", () => {
            document.querySelectorAll(".sidebar-card").forEach(c => c.classList.remove("active"));
            card.classList.add("active");
            map.flyTo({ center: [apt.lon, apt.lat], zoom: 15 });
        });
        sidebarList.appendChild(card);
    });
}

function populateSidebarEvents(events) {
    sidebarTitle.textContent = "Events";
    sidebarList.innerHTML = "";

    const filtered = events.filter(ev => ev.latitude != null && ev.longitude != null);
    sidebarCount.textContent = `${filtered.length} event${filtered.length !== 1 ? "s" : ""}`;

    if (filtered.length === 0) {
        sidebarList.innerHTML = `<div class="sidebar-empty">No events match the current filters.</div>`;
        return;
    }

    filtered.forEach(ev => {
        const card = buildEventSidebarCard(ev);
        card.addEventListener("click", () => {
            document.querySelectorAll(".sidebar-card").forEach(c => c.classList.remove("active"));
            card.classList.add("active");
            map.flyTo({ center: [ev.longitude, ev.latitude], zoom: 15 });
        });
        sidebarList.appendChild(card);
    });
}

// ── Popup builders ────────────────────────────────────────────────────────────

function buildAptPopupHTML(apt) {
    const title   = apt.title || apt.address || "Apartment";
    const address = apt.address || "Unknown address";
    const phone   = apt.phone_number || null;
    const link    = apt.link || null;
    const rent    = apt.rent_by_bed;

    let badges = `<div class="badges">`;
    badges += `<span class="badge">${pinIcon} ${escapeHtml(address)}</span>`;
    if (phone) badges += `<span class="badge">${phoneIcon} ${escapeHtml(phone)}</span>`;
    badges += `</div>`;

    let rentBlock = "";
    if (rent && Object.keys(rent).length > 0) {
        rentBlock = `<div class="rent-block"><strong>Rent</strong><ul>`;
        for (const [bed, price] of Object.entries(rent)) {
            rentBlock += `<li>${escapeHtml(bed)} — ${escapeHtml(price)}</li>`;
        }
        rentBlock += `</ul></div>`;
    } else {
        rentBlock = `<div class="rent-block"><strong>Rent:</strong> N/A</div>`;
    }

    const cta = link
        ? `<a class="cta" href="${escapeHtml(link)}" target="_blank">View on Apartments.com</a>`
        : "";

    return `
        <div class="apt-popup">
            <h3>${escapeHtml(title)}</h3>
            ${badges}
            ${rentBlock}
            ${cta}
        </div>`;
}

function buildEventCardHTML(event) {
    const title   = event.event_title || "Event";
    const address = event.address     || "";
    const date    = event.event_date  || "";
    const desc    = event.description || "";
    const link    = event.event_detail_url || null;

    let badges = `<div class="badges">`;
    if (date)    badges += `<span class="badge">${calIcon} ${escapeHtml(date)}</span>`;
    if (address) badges += `<span class="badge wrappable">${pinIcon} ${escapeHtml(address)}</span>`;
    badges += `</div>`;

    const descBlock = desc
        ? `<p class="evt-desc">${escapeHtml(desc.length > 120 ? desc.slice(0, 120) + "…" : desc)}</p>`
        : "";

    const cta = link
        ? `<a class="cta" href="${escapeHtml(link)}" target="_blank">View on Catch Des Moines</a>`
        : "";

    return `
        <div class="apt-popup">
            <h3>${escapeHtml(title)}</h3>
            ${badges}
            ${descBlock}
            ${cta}
        </div>`;
}

// ── GeoJSON builders ──────────────────────────────────────────────────────────

function buildApartmentGeoJSON(apartments, maxPrice) {
    return {
        type: "FeatureCollection",
        features: apartments
            .filter(apt => apt.lat && apt.lon)
            .filter(apt => {
                const minPrice = getApartmentMinPrice(apt);
                if (minPrice === null) return true;
                return minPrice <= maxPrice;
            })
            .map(apt => ({
                type: "Feature",
                geometry: { type: "Point", coordinates: [apt.lon, apt.lat] },
                properties: {
                    popupHTML: buildAptPopupHTML(apt),
                    title: apt.title || apt.address || "Apartment"
                }
            }))
    };
}

function buildEventGeoJSON(events) {
    const grouped = groupByCoord(events);
    return {
        type: "FeatureCollection",
        features: Object.entries(grouped).map(([key, evs]) => {
            const [lng, lat] = key.split(",").map(Number);
            return {
                type: "Feature",
                geometry: { type: "Point", coordinates: [lng, lat] },
                properties: {
                    coordKey: key,
                    count: evs.length,
                    title: evs[0].event_title || "Event"
                }
            };
        })
    };
}

// ── Carousel popup (events) ───────────────────────────────────────────────────

function buildEventCarouselNode(events) {
    let index = 0;
    const wrapper = document.createElement("div");
    wrapper.className = "apt-popup popup-carousel";

    const content = document.createElement("div");
    content.className = "carousel-content";
    wrapper.appendChild(content);

    let prevBtn, nextBtn, counter;
    if (events.length > 1) {
        const nav = document.createElement("div");
        nav.className = "carousel-nav";

        prevBtn = document.createElement("button");
        prevBtn.textContent = "←";
        prevBtn.title = "Previous event";

        counter = document.createElement("span");
        counter.className = "carousel-counter";

        nextBtn = document.createElement("button");
        nextBtn.textContent = "→";
        nextBtn.title = "Next event";

        nav.appendChild(prevBtn);
        nav.appendChild(counter);
        nav.appendChild(nextBtn);
        wrapper.appendChild(nav);

        prevBtn.addEventListener("click", () => { if (index > 0) { index--; render(); } });
        nextBtn.addEventListener("click", () => { if (index < events.length - 1) { index++; render(); } });
    }

    function render() {
        content.innerHTML = buildEventCardHTML(events[index]);
        if (events.length > 1) {
            counter.textContent = `${index + 1} / ${events.length}`;
            prevBtn.disabled = index === 0;
            nextBtn.disabled = index === events.length - 1;
        }
    }

    render();
    return wrapper;
}

// ── Layer helpers ─────────────────────────────────────────────────────────────

function setLayerGroupVisibility(prefix, visible) {
    const v = visible ? "visible" : "none";
    [`${prefix}-clusters`, `${prefix}-cluster-count`, `${prefix}-unclustered-point`]
        .forEach(id => { if (map.getLayer(id)) map.setLayoutProperty(id, "visibility", v); });
}

function addClusteredLayer(prefix, geojson, color, darkColor, veryDarkColor) {
    map.addSource(prefix, {
        type: "geojson",
        data: geojson,
        cluster: true,
        clusterMaxZoom: 14,
        clusterRadius: 50
    });

    map.addLayer({
        id: `${prefix}-clusters`,
        type: "circle",
        source: prefix,
        filter: ["has", "point_count"],
        paint: {
            "circle-color": ["step", ["get", "point_count"], color, 10, darkColor, 30, veryDarkColor],
            "circle-radius": ["step", ["get", "point_count"], 20, 10, 28, 30, 36],
            "circle-opacity": 0.85,
            "circle-stroke-width": 2,
            "circle-stroke-color": "#fff"
        }
    });

    map.addLayer({
        id: `${prefix}-cluster-count`,
        type: "symbol",
        source: prefix,
        filter: ["has", "point_count"],
        layout: {
            "text-field": "{point_count_abbreviated}",
            "text-font": ["DIN Offc Pro Medium", "Arial Unicode MS Bold"],
            "text-size": 14
        },
        paint: { "text-color": "#ffffff" }
    });

    map.addLayer({
        id: `${prefix}-unclustered-point`,
        type: "circle",
        source: prefix,
        filter: ["!", ["has", "point_count"]],
        paint: {
            "circle-radius": 8,
            "circle-color": color,
            "circle-stroke-width": 2,
            "circle-stroke-color": "#fff"
        }
    });

    map.on("click", `${prefix}-clusters`, e => {
        const features = map.queryRenderedFeatures(e.point, { layers: [`${prefix}-clusters`] });
        const clusterId = features[0].properties.cluster_id;
        map.getSource(prefix).getClusterExpansionZoom(clusterId, (err, zoom) => {
            if (err) return;
            map.easeTo({ center: features[0].geometry.coordinates, zoom });
        });
    });

    map.on("mouseenter", `${prefix}-clusters`,          () => map.getCanvas().style.cursor = "pointer");
    map.on("mouseleave", `${prefix}-clusters`,          () => map.getCanvas().style.cursor = "");
    map.on("mouseenter", `${prefix}-unclustered-point`, () => map.getCanvas().style.cursor = "pointer");
    map.on("mouseleave", `${prefix}-unclustered-point`, () => map.getCanvas().style.cursor = "");
}

// ── Main ──────────────────────────────────────────────────────────────────────

let eventGroups = {};

map.on("load", () => {
    Promise.all([
        fetch("/static/bs-results/apartments-test.json").then(r => r.json()),
        fetch("/static/bs-results/catchdesmoines-events.json").then(r => r.json())
    ]).then(([apartments, events]) => {

        const priceRange      = document.getElementById("priceRange");
        const priceValue      = document.getElementById("priceValue");
        const apartmentFilters = document.getElementById("apartment-filters");
        const eventFilters    = document.getElementById("event-filters");
        const eventStartDate  = document.getElementById("eventStartDate");
        const eventEndDate    = document.getElementById("eventEndDate");

        // ── Apartments ────────────────────────────────────────────────────
        function updateApartmentLayer(maxPrice) {
            const priceNumber = Number(maxPrice);
            priceRange.value = priceNumber;
            priceValue.value = priceNumber;
            map.getSource("apartments").setData(buildApartmentGeoJSON(apartments, priceNumber));
            populateSidebarApartments(apartments, priceNumber);
        }

        const initialAptGeoJSON = buildApartmentGeoJSON(apartments, Number(priceRange.value));
        priceValue.value = priceRange.value;
        addClusteredLayer("apartments", initialAptGeoJSON, "#3B82F6", "#2563EB", "#1E3A8A");
        populateSidebarApartments(apartments, Number(priceRange.value));

        map.on("click", "apartments-unclustered-point", e => {
            const coords = e.features[0].geometry.coordinates.slice();
            const { popupHTML } = e.features[0].properties;
            while (Math.abs(e.lngLat.lng - coords[0]) > 180)
                coords[0] += e.lngLat.lng > coords[0] ? 360 : -360;
            new mapboxgl.Popup({ offset: 12, maxWidth: "320px" })
                .setLngLat(coords)
                .setHTML(popupHTML)
                .addTo(map);
        });

        priceRange.addEventListener("input", () => updateApartmentLayer(priceRange.value));

        priceValue.addEventListener("change", () => {
            let v = Number(priceValue.value);
            if (Number.isNaN(v)) { priceValue.value = priceRange.value; return; }
            v = Math.max(Number(priceRange.min), Math.min(Number(priceRange.max), v));
            updateApartmentLayer(v);
        });

        priceValue.addEventListener("blur", () => {
            let v = Number(priceValue.value);
            if (Number.isNaN(v)) { priceValue.value = priceRange.value; return; }
            v = Math.max(Number(priceRange.min), Math.min(Number(priceRange.max), v));
            updateApartmentLayer(v);
        });

        // ── Events ────────────────────────────────────────────────────────
        const allEventCategories = collectEventCategories(events);
        buildEventCategoryFilters(allEventCategories);

        function updateEventLayer() {
            const startDate = eventStartDate.value || null;
            const endDate   = eventEndDate.value   || null;
            const selectedCategories = getSelectedEventCategories();

            const filteredEvents = events.filter(ev => {
                if (ev.latitude == null || ev.longitude == null) return false;
                if (!eventMatchesDateRange(ev, startDate, endDate)) return false;
                if (!eventMatchesCategories(ev, selectedCategories)) return false;
                return true;
            });

            eventGroups = groupByCoord(filteredEvents);
            map.getSource("events").setData(buildEventGeoJSON(filteredEvents));
            populateSidebarEvents(filteredEvents);
        }

        eventStartDate.addEventListener("change", updateEventLayer);
        eventEndDate.addEventListener("change", updateEventLayer);
        document.getElementById("eventCategoryFilters").addEventListener("change", updateEventLayer);

        const initialFilteredEvents = events.filter(ev => ev.latitude != null && ev.longitude != null);
        eventGroups = groupByCoord(initialFilteredEvents);
        addClusteredLayer("events", buildEventGeoJSON(initialFilteredEvents), "#EF4444", "#DC2626", "#991B1B");
        setLayerGroupVisibility("events", false);

        map.on("click", "events-unclustered-point", e => {
            const coords = e.features[0].geometry.coordinates.slice();
            const { coordKey } = e.features[0].properties;
            while (Math.abs(e.lngLat.lng - coords[0]) > 180)
                coords[0] += e.lngLat.lng > coords[0] ? 360 : -360;
            const eventsAtLocation = eventGroups[coordKey] || [];
            const carouselNode = buildEventCarouselNode(eventsAtLocation);
            new mapboxgl.Popup({ offset: 12, maxWidth: "380px" })
                .setLngLat(coords)
                .setDOMContent(carouselNode)
                .addTo(map);
        });

        // ── Radio toggle ──────────────────────────────────────────────────
        function updateVisibleLayer(selectedLayer) {
            const showApts = selectedLayer === "apartments";
            setLayerGroupVisibility("apartments", showApts);
            setLayerGroupVisibility("events",    !showApts);
            apartmentFilters.style.display = showApts ? "flex" : "none";
            eventFilters.style.display     = showApts ? "none"  : "flex";
            if (showApts) {
                populateSidebarApartments(apartments, Number(priceRange.value));
            } else {
                const startDate = eventStartDate.value || null;
                const endDate   = eventEndDate.value   || null;
                const selectedCategories = getSelectedEventCategories();
                const filteredEvents = events.filter(ev => {
                    if (ev.latitude == null || ev.longitude == null) return false;
                    if (!eventMatchesDateRange(ev, startDate, endDate)) return false;
                    if (!eventMatchesCategories(ev, selectedCategories)) return false;
                    return true;
                });
                populateSidebarEvents(filteredEvents);
            }
        }

        document.querySelectorAll('input[name="layer"]').forEach(radio => {
            radio.addEventListener("change", e => updateVisibleLayer(e.target.value));
        });

        const selectedLayer = document.querySelector('input[name="layer"]:checked')?.value || "apartments";
        updateVisibleLayer(selectedLayer);
    });
});
</script>
