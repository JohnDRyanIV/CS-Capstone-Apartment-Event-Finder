<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Des Moines Apartment Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        #map {
            width: 100%;
            height: 100vh;
        }

        .legend {
            position: absolute;
            top: 10px;
            left: 10px;
            background: white;
            padding: 10px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            font-size: 14px;
            z-index: 1;
        }

        .popup h3 {
            margin: 0 0 6px 0;
        }

        .popup p {
            margin: 3px 0;
        }

        .popup ul {
            margin: 4px 0 6px 16px;
        }
    </style>
</head>
<body>

<div class="legend">
    <strong>Legend</strong><br>
    🔵 Apartment<br>
    🔴 Event
</div>

function escapeHtml(text){
    if(!text) return "";
    return String(text)
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;");
}


function buildBedsRent(rentData){
    if(!rentData || Object.keys(rentData).length === 0){
        return "<p><strong>Rent:</strong> N/A</p>";
    }

    let html = "<p><strong>Rent:</strong></p><ul>";

    for(const [bed, price] of Object.entries(rentData)){
        html += `<li>${escapeHtml(bed)} — ${escapeHtml(price)}</li>`;
    }

    html += "</ul>";
    return html;
}
