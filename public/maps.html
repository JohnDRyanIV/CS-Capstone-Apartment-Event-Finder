<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Des Moines Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@700&family=Source+Serif+4:wght@400;600&display=swap" rel="stylesheet">
    <link href="/public/css/global.css" rel="stylesheet">
    <link href="/public/css/maps.css" rel="stylesheet">
    {% include "bootstrap.html" %}
</head>
<body>
    <header>
        {% include "navbar.html" %}
    </header>

<!-- ── Mobile topbar (hidden on md+) ──────────────────────────────────────── -->
<div id="topbar" class="d-flex d-md-none align-items-center flex-wrap gap-2 px-3 py-2">

    <div class="layer-toggle">
        <button class="layer-btn active" data-layer="apartments">🔵 Apartments</button>
        <button class="layer-btn" data-layer="events">🔴 Events</button>
    </div>

    <!-- Apartment filters (mobile) -->
    <div id="apt-filters-mobile" class="d-flex align-items-center gap-2 border-start ps-3">
        <label class="form-label mb-0 small fw-semibold">Max Rent</label>
        <input type="range" class="form-range" id="priceRangeMobile" min="500" max="4000" step="50" value="4000" style="width:100px">
        <input type="number" class="form-control form-control-sm" id="priceValueMobile" min="500" max="4000" step="50" value="4000" style="width:72px">
    </div>

    <!-- Event filters (mobile) -->
    <div id="evt-filters-mobile" class="d-none align-items-center flex-wrap gap-2 border-start ps-3">
        <div class="d-flex align-items-center gap-1">
            <label class="form-label mb-0 small fw-semibold">From</label>
            <input type="date" class="form-control form-control-sm" id="eventStartDateMobile" style="width:135px">
        </div>
        <div class="d-flex align-items-center gap-1">
            <label class="form-label mb-0 small fw-semibold">To</label>
            <input type="date" class="form-control form-control-sm" id="eventEndDateMobile" style="width:135px">
        </div>
        <div id="eventCategoryFiltersMobile" class="d-flex flex-wrap gap-2"></div>
    </div>
</div>

<!-- ── Main content (map + sidebar) ───────────────────────────────────────── -->
<div id="main-content">

    <!-- Desktop floating controls (hidden on mobile) -->
    <div id="desktop-controls" class="d-none d-md-flex flex-column gap-2">
        <div class="layer-toggle vertical">
            <button class="layer-btn active" data-layer="apartments">🔵 Apartments</button>
            <button class="layer-btn" data-layer="events">🔴 Events</button>
        </div>

        <div id="apt-filters-desktop" class="d-flex flex-column gap-1 pt-2 border-top">
            <strong class="small">Apartment Filters</strong>
            <label class="form-label mb-0 small">Max Rent</label>
            <div class="d-flex align-items-center gap-2">
                <input type="range" class="form-range" id="priceRange" min="500" max="4000" step="50" value="4000" style="width:140px">
                <input type="number" class="form-control form-control-sm" id="priceValue" min="500" max="4000" step="50" value="4000" style="width:72px">
            </div>
        </div>

        <div id="evt-filters-desktop" class="d-none flex-column gap-1 pt-2 border-top">
            <strong class="small">Event Filters</strong>
            <label class="form-label mb-0 small">Start Date</label>
            <input type="date" class="form-control form-control-sm" id="eventStartDate">
            <label class="form-label mb-0 small">End Date</label>
            <input type="date" class="form-control form-control-sm" id="eventEndDate">
            <strong class="small mt-1">Categories</strong>
            <div id="eventCategoryFilters" class="d-flex flex-column gap-1 overflow-auto" style="max-height:160px"></div>
        </div>
    </div>

    <div id="map"></div>

    <!-- Sidebar -->
    <div id="sidebar">
        <div id="sidebar-header" class="d-flex align-items-center justify-content-between px-3 py-2 border-bottom flex-shrink-0">
            <div>
                <h2 id="sidebar-title" class="mb-0">Apartments</h2>
                <div id="sidebar-count" class="text-muted small"></div>
            </div>
            <button id="sidebar-toggle" aria-label="Toggle sidebar">▼</button>
        </div>
        <div id="sidebar-list"></div>
    </div>

</div>

<script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    window.MAPBOX_TOKEN = "{{ mapbox_token }}";
    window.IS_LOGGED_IN = {{ is_logged_in | tojson }};
    console.log("IS_LOGGED_IN:", window.IS_LOGGED_IN);
</script>
<script src="/public/js/maps.js"></script>
</body>
</html>
